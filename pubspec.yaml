name: exam_proctor_app
description: Production-ready Flutter proctoring app with stealth recording, compression, and secure upload.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+1
  dio: ^5.5.0+1
  video_compress: ^3.1.4
  flutter_background_service: ^5.0.7
  flutter_background_service_android: ^6.3.0
  get_it: ^7.7.0
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
